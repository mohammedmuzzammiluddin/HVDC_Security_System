{% extends 'base.html' %}
{% block title %}Notification Preferences{% endblock %}

{% block content %}
<h1 class="page-title"><i class="fas fa-cog me-2 text-cyan"></i>Notification Preferences</h1>
<div class="card p-4" style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    {% for label, field_name, checked in pref_fields %}
    <div class="form-check form-switch mb-3">
      <input class="form-check-input" type="checkbox" name="{{ field_name }}" id="{{ field_name }}" {% if checked %}checked{% endif %}>
      <label class="form-check-label text-light" for="{{ field_name }}">{{ label }}</label>
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-cyber mt-2">Save Preferences</button>
  </form>
</div>
{% endblock %}
