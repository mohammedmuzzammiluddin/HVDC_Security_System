{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}

{% block content %}
<h1 class="page-title"><i class="fas fa-user-edit me-2 text-cyan"></i>Edit User: {{ target_user.username }}</h1>
<div class="card p-4" style="max-width:500px;">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label text-secondary small">Role</label>
      <select name="role" class="form-control">
        {% for val, label in target_user.ROLE_CHOICES %}
        <option value="{{ val }}" {% if target_user.role == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-check form-switch mb-4">
      <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
             {% if target_user.is_active %}checked{% endif %}>
      <label class="form-check-label text-light" for="is_active">Account Active</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-cyber px-4">Save Changes</button>
      <a href="{% url 'accounts:user_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
